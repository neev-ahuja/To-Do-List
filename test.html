<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To - Do List</title>
    <link rel="stylesheet" href="style2.css">
</head>

<body>
    <div class="header">
        <img src="./8476658.png">
        <h1>To-Do List</h1>
    </div>
    <div class="container">
        <ul id="listContainer">
            <!-- Task items will be added dynamically here -->
        </ul>
    </div>
    <div class="footer">
        <button id="addTaskButton">Add Task</button>
    </div>

    <!-- Modal for adding a new task -->
    <div id="taskModal" class="modal" style="display: none;">
        <div class="modal-content">
            <h2>Add Task</h2>
            <label for="taskName">Task Name:</label>
            <input type="text" id="taskName" placeholder="Enter task name">
            <label for="taskDate">Task Date:</label>
            <input type="date" id="taskDate">
            <label for="taskDescription">Task Description:</label>
            <textarea id="taskDescription" placeholder="Enter task description"></textarea>
            <button id="saveTaskButton">Save Task</button>
            <button id="closeModalButton">Close</button>
        </div>
    </div>

    <script>
        let listContainer = document.getElementById("listContainer");
        let addTaskButton = document.getElementById("addTaskButton");
        let taskModal = document.getElementById("taskModal");
        let saveTaskButton = document.getElementById("saveTaskButton");
        let closeModalButton = document.getElementById("closeModalButton");

        // Function to toggle the modal
        const toggleModal = () => {
            taskModal.style.display = taskModal.style.display === "none" ? "block" : "none";
        };

        // Show the modal when "Add Task" is clicked
        addTaskButton.onclick = toggleModal;
        closeModalButton.onclick = toggleModal;

        // Function to save data to local storage
        const saveData = () => {
            localStorage.setItem("data", listContainer.innerHTML);
        };

        // Function to show data from local storage
        const showData = () => {
            listContainer.innerHTML = localStorage.getItem("data") || "";
            attachEventListeners(); // Re-attach events after loading tasks
        };

        // Function to add a new task
        saveTaskButton.onclick = () => {
            let taskName = document.getElementById("taskName").value;
            let taskDate = document.getElementById("taskDate").value;
            let taskDescription = document.getElementById("taskDescription").value;

            if (taskName && taskDate && taskDescription) {
                let li = document.createElement("li");
                li.innerHTML = `
                    <div class="checkbox"><img class="boxes" src="./box.png" alt="Checkbox"></div>
                    <div class="task-details">
                        <h3>${taskName}</h3>
                        <p>${taskDate}</p>
                        <p>${taskDescription}</p>
                    </div>
                    <button class="delete-task">Delete</button>`;
                listContainer.appendChild(li);

                // Clear input fields and close modal
                document.getElementById("taskName").value = "";
                document.getElementById("taskDate").value = "";
                document.getElementById("taskDescription").value = "";
                toggleModal();

                saveData();
                attachEventListeners(); // Re-attach events after adding a task
            } else {
                alert("Please fill out all fields!");
            }
        };

        // Function to handle checkbox clicks and delete buttons
        const attachEventListeners = () => {
            let checkboxes = document.querySelectorAll(".boxes");
            checkboxes.forEach(element => {
                element.onclick = () => {
                    element.src = element.src.includes("box.png") ? "./checked.jpg" : "./box.png";
                };
            });

            let deleteButtons = document.querySelectorAll(".delete-task");
            deleteButtons.forEach(button => {
                button.onclick = (e) => {
                    e.target.parentElement.remove();
                    saveData();
                };
            });
        };

        // Initialize app
        showData();
    </script>
</body>

</html>
